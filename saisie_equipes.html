<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saisie Équipe | Orient'Show</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; touch-action: manipulation; color: white; user-select: none; }
        .input-box { background: #1e293b; border: 2px solid #334155; text-align: center; font-size: 3rem; font-weight: 900; border-radius: 12px; width: 80px; height: 80px; text-transform: uppercase; outline: none; }
        .input-box:focus { border-color: #3b82f6; background: #000; }
        .circuit-btn { transition: all 0.2s; }
        .circuit-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col h-screen font-sans p-3">

    <!-- ECRAN DE CONNEXION -->
    <div id="loginScreen" class="flex-1 flex flex-col items-center justify-center gap-6">
        <h1 class="text-4xl font-black italic text-blue-500 tracking-tighter uppercase mb-4">Orient'Show<br><span class="text-white text-2xl">Mode Équipes</span></h1>
        
        <select id="catSelect" class="w-full max-w-sm bg-slate-800 border-2 border-slate-600 text-white font-bold p-4 rounded-xl text-xl uppercase outline-none" onchange="loadEquipes()">
            <option value="">1. CATÉGORIE ?</option>
        </select>

        <select id="teamSelect" class="w-full max-w-sm bg-slate-800 border-2 border-slate-600 text-white font-bold p-4 rounded-xl text-xl uppercase outline-none hidden" onchange="checkLock()">
            <option value="">2. ÉQUIPE ?</option>
        </select>

        <button id="btnLock" onclick="verrouillerEquipe()" class="hidden w-full max-w-sm py-4 bg-emerald-600 text-white font-black text-2xl rounded-xl shadow-[0_0_15px_rgba(5,150,105,0.6)] uppercase tracking-widest mt-4">
            🔒 VERROUILLER
        </button>
    </div>

    <!-- ECRAN PRINCIPAL (TABLEAU DE BORD) -->
    <div id="dashboardScreen" class="hidden flex-1 flex flex-col">
        <header class="bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-md mb-4 flex justify-between items-center">
            <div class="leading-tight">
                <div id="dispCat" class="text-xs font-bold text-slate-400 uppercase">Catégorie</div>
                <div id="dispTeam" class="text-xl font-black text-blue-400 uppercase">Nom de l'équipe</div>
            </div>
            <div class="text-right">
                <div class="text-xs font-bold text-slate-400 uppercase">Score (Max 400)</div>
                <div id="dispScore" class="text-3xl font-black text-emerald-400">40 PTS</div>
            </div>
        </header>

        <div id="circuitsGrid" class="grid grid-cols-3 gap-3 flex-1 pb-4">
            <!-- Boutons générés en JS -->
        </div>

        <button onclick="deverrouiller()" class="text-[10px] text-slate-600 font-bold uppercase mt-2 text-center w-full">⚙️ Changer d'équipe (Prof)</button>
    </div>

    <!-- ECRAN DE SAISIE MODAL -->
    <div id="saisieScreen" class="hidden fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-4">
        <h2 id="saisieTitre" class="text-5xl font-black text-white mb-8">C1</h2>
        <div class="flex justify-center items-center gap-6 mb-12">
            <input type="text" id="l1" class="input-box" maxlength="1" oninput="this.value=this.value.toUpperCase(); if(this.value) document.getElementById('l2').focus()">
            <input type="text" id="l2" class="input-box" maxlength="1" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="flex gap-4 w-full max-w-sm">
            <button onclick="fermerSaisie()" class="flex-1 py-4 bg-slate-700 text-white font-black text-xl rounded-xl">ANNULER</button>
            <button onclick="validerCircuit()" class="flex-1 py-4 bg-blue-600 text-white font-black text-xl rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.6)]">VALIDER</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://orientshow-3a86f-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mapping = {}, activeCat = "", activeTeamId = "", teamCode = "", matrix = {};
        let listenerRef = null;

        window.onload = () => {
            db.ref('equipes/settings/matrix').on('value', s => matrix = s.val() || {});
            db.ref('equipes/mapping').on('value', snap => {
                mapping = snap.val() || {};
                const sel = document.getElementById('catSelect');
                sel.innerHTML = '<option value="">1. CATÉGORIE ?</option>' + Object.keys(mapping).map(c => `<option value="${c}">${c}</option>`).join('');
                if(localStorage.getItem('os_eq_locked')) {
                    const data = JSON.parse(localStorage.getItem('os_eq_locked'));
                    activeCat = data.cat; activeTeamId = data.id; teamCode = data.code;
                    afficherDashboard();
                }
            });
        };

        function loadEquipes() {
            activeCat = document.getElementById('catSelect').value;
            const tSel = document.getElementById('teamSelect');
            if(!activeCat) { tSel.classList.add('hidden'); return; }
            
            const teams = Object.values(mapping[activeCat] || {}).sort((a,b) => a.name.localeCompare(b.name));
            tSel.innerHTML = '<option value="">2. ÉQUIPE ?</option>' + teams.map(t => `<option value="${t.id}" data-code="${t.code}">${t.name}</option>`).join('');
            tSel.classList.remove('hidden');
        }

        function checkLock() {
            const btn = document.getElementById('btnLock');
            document.getElementById('teamSelect').value ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }

        function verrouillerEquipe() {
            const tSel = document.getElementById('teamSelect');
            activeTeamId = tSel.value;
            teamCode = tSel.options[tSel.selectedIndex].dataset.code;
            localStorage.setItem('os_eq_locked', JSON.stringify({ cat: activeCat, id: activeTeamId, code: teamCode }));
            afficherDashboard();
        }

        function deverrouiller() {
            if(confirm("Mot de passe prof nécessaire pour déverrouiller. Continuer ?")) {
                localStorage.removeItem('os_eq_locked');
                location.reload();
            }
        }

        function afficherDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('flex');
            
            const teamInfo = Object.values(mapping[activeCat]||{}).find(t => t.id == activeTeamId);
            document.getElementById('dispCat').innerText = activeCat;
            document.getElementById('dispTeam').innerText = teamInfo ? teamInfo.name : "Équipe";

            if(listenerRef) listenerRef.off();
            listenerRef = db.ref(`equipes/sessions/${activeCat}/${activeTeamId}`);
            listenerRef.on('value', snap => majGrille(snap.val() || {}));
        }

        function majGrille(sessionData) {
            let gridHTML = "";
            let scoreTotal = 40; // Capital de départ

            for(let i=1; i<=12; i++) {
                const cData = sessionData[`C${i}`];
                if(cData) {
                    scoreTotal += cData.score;
                    let bg = cData.score === 30 ? 'bg-emerald-600' : (cData.score === 10 ? 'bg-orange-500' : 'bg-red-600');
                    gridHTML += `<div class="circuit-btn ${bg} rounded-2xl flex flex-col items-center justify-center border-b-4 border-black/30 text-white opacity-90 cursor-default">
                                    <span class="text-2xl font-black">C${i}</span>
                                    <span class="text-sm font-bold bg-black/20 px-2 rounded mt-1">+${cData.score}</span>
                                 </div>`;
                } else {
                    gridHTML += `<button onclick="ouvrirSaisie(${i})" class="circuit-btn bg-slate-700 rounded-2xl flex items-center justify-center border-b-4 border-slate-900 shadow-inner">
                                    <span class="text-2xl font-black text-slate-400">C${i}</span>
                                 </button>`;
                }
            }
            document.getElementById('circuitsGrid').innerHTML = gridHTML;
            document.getElementById('dispScore').innerText = `${scoreTotal} PTS`;
        }

        let curSaisie = 0;
        function ouvrirSaisie(id) {
            curSaisie = id;
            document.getElementById('saisieTitre').innerText = `CIRCUIT ${id}`;
            document.getElementById('l1').value = ""; document.getElementById('l2').value = "";
            document.getElementById('saisieScreen').classList.remove('hidden');
            setTimeout(() => document.getElementById('l1').focus(), 100);
        }

        function fermerSaisie() { document.getElementById('saisieScreen').classList.add('hidden'); }

        function validerCircuit() {
            const l1 = document.getElementById('l1').value.toUpperCase();
            const l2 = document.getElementById('l2').value.toUpperCase();
            if(!l1 && !l2) return alert("Saisis au moins une lettre !");

            const color = teamCode.split('_')[0]; // ex: NOIR
            const codeVerite = matrix[curSaisie]?.[color];
            let pts = 0;

            if(codeVerite) {
                let truth = [...codeVerite];
                let typed = [l1, l2].filter(x => x !== "");
                
                typed.forEach(lettre => {
                    let idx = truth.indexOf(lettre);
                    if(idx !== -1) { pts += 15; truth.splice(idx, 1); } // 15 + 15 = 30 pts max
                });
                
                pts = (pts === 30) ? 30 : ((pts === 15) ? 10 : 0);
            }

            db.ref(`equipes/sessions/${activeCat}/${activeTeamId}/C${curSaisie}`).set({
                score: pts, realTime: Date.now()
            }).then(() => {
                fermerSaisie();
            });
        }
    </script>
</body>
</html>
